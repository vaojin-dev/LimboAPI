name: Java CI with Gradle

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Cache generated data
        uses: actions/cache@v5.0.4
        with:
          path: |
            plugin/build/minecraft/
            plugin/build/generated/minecraft/mapping/
          key: minecraft-${{ hashFiles('gradle.properties') }}
      - name: Build LimboAPI
        run: ./gradlew build

      - name: Upload Artifact (all JARs)
        uses: actions/upload-artifact@v4
        with:
          name: LimboAPI
          path: "**/build/libs/*.jar"

      - name: Delete previous dev-build tag & release
        if: ${{ github.event_name == 'push' }}
        uses: dev-drprasad/delete-tag-and-release@v0.2.1
        with:
          delete_release: true
          tag_name: dev-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Git short SHA
        if: ${{ github.event_name == 'push' }}
        id: git-version
        run: echo "id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Find main JAR (exclude sources/javadoc)
        if: ${{ github.event_name == 'push' }}
        id: find-jar
        run: |
          jarpath="$(find plugin/build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-javadoc.jar" ! -name "*-sources.jar" | head -n 1)"
          if [ -z "$jarpath" ]; then
            echo "No jar found in plugin/build/libs" >&2
            exit 1
          fi
          echo "jarpath=$jarpath" >> $GITHUB_OUTPUT
          echo "jarname=$(basename "$jarpath")" >> $GITHUB_OUTPUT

      - name: Release dev-build
        if: ${{ github.event_name == 'push' }}
        uses: ncipollo/release-action@v1
        with:
          tag: dev-build
          name: Dev-build ${{ steps.git-version.outputs.id }}
          draft: false
          prerelease: true
          artifacts: ${{ steps.find-jar.outputs.jarpath }}
          body: ${{ join(github.event.commits.*.message, '\n') }}
